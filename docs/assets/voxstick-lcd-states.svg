<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">VoxStick LCD status states</title>
  <desc id="desc">Three low-power StickS3 LCD drawings showing open microphone, speaking activity, and muted microphone states.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" rx="28" fill="#f6f8fb"/>
  <text x="52" y="62" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">VoxStick LCD</text>
  <text x="52" y="96" fill="#5c687a" font-family="Inter, Arial, sans-serif" font-size="18">dim backlight, black background, small mic icon</text>

  <g transform="translate(90 128)" filter="url(#shadow)">
    <rect width="150" height="248" rx="18" fill="url(#panel)"/>
    <rect x="8" y="8" width="134" height="232" rx="12" fill="#020617"/>
    <g transform="translate(75 27)" fill="#38d8ff">
      <rect x="-10" y="20" width="20" height="4"/>
      <rect x="-15" y="24" width="30" height="4"/>
      <rect x="-18" y="28" width="4" height="46"/>
      <rect x="14" y="28" width="4" height="46"/>
      <rect x="-15" y="74" width="30" height="4"/>
      <rect x="-10" y="78" width="20" height="4"/>
      <rect x="-30" y="54" width="4" height="22"/>
      <rect x="26" y="54" width="4" height="22"/>
      <rect x="-26" y="82" width="52" height="4"/>
      <rect x="-2" y="86" width="4" height="24"/>
      <rect x="-20" y="110" width="40" height="4"/>
    </g>
    <rect x="45" y="180" width="60" height="4" fill="#10242d"/>
    <rect x="45" y="180" width="18" height="4" fill="#164e63"/>
    <text x="75" y="222" fill="#8fb8c8" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">open</text>
  </g>

  <g transform="translate(405 128)" filter="url(#shadow)">
    <rect width="150" height="248" rx="18" fill="url(#panel)"/>
    <rect x="8" y="8" width="134" height="232" rx="12" fill="#020617"/>
    <g transform="translate(75 27)" fill="#f8fafc">
      <rect x="-10" y="20" width="20" height="4"/>
      <rect x="-15" y="24" width="30" height="4"/>
      <rect x="-18" y="28" width="4" height="46"/>
      <rect x="14" y="28" width="4" height="46"/>
      <rect x="-15" y="74" width="30" height="4"/>
      <rect x="-10" y="78" width="20" height="4"/>
      <rect x="-10" y="34" width="20" height="34" fill="#164e63"/>
      <rect x="-30" y="54" width="4" height="22"/>
      <rect x="26" y="54" width="4" height="22"/>
      <rect x="-26" y="82" width="52" height="4"/>
      <rect x="-2" y="86" width="4" height="24"/>
      <rect x="-20" y="110" width="40" height="4"/>
    </g>
    <rect x="45" y="180" width="60" height="4" fill="#10242d"/>
    <rect x="45" y="180" width="48" height="4" fill="#22c55e"/>
    <text x="75" y="222" fill="#bdebd0" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">talking</text>
  </g>

  <g transform="translate(720 128)" filter="url(#shadow)">
    <rect width="150" height="248" rx="18" fill="url(#panel)"/>
    <rect x="8" y="8" width="134" height="232" rx="12" fill="#020617"/>
    <g transform="translate(75 27)" fill="#cbd5e1">
      <rect x="-10" y="20" width="20" height="4"/>
      <rect x="-15" y="24" width="30" height="4"/>
      <rect x="-18" y="28" width="4" height="46"/>
      <rect x="14" y="28" width="4" height="46"/>
      <rect x="-15" y="74" width="30" height="4"/>
      <rect x="-10" y="78" width="20" height="4"/>
      <rect x="-30" y="54" width="4" height="22"/>
      <rect x="26" y="54" width="4" height="22"/>
      <rect x="-26" y="82" width="52" height="4"/>
      <rect x="-2" y="86" width="4" height="24"/>
      <rect x="-20" y="110" width="40" height="4"/>
    </g>
    <line x1="47" y1="177" x2="103" y2="89" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <rect x="45" y="180" width="60" height="4" fill="#1f2937"/>
    <text x="75" y="222" fill="#e7a1a1" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">muted</text>
  </g>
</svg>
