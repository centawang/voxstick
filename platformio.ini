; voxstick — USB UAC + HID push-to-talk dictation stick on M5Stack StickS3.
;
; Build & flash:
;     pio run -t upload
; Serial monitor (USB-Serial/JTAG, kept for log even when UAC is active):
;     pio device monitor

[platformio]
default_envs = stick
; ESP-IDF expects sources under main/, not src/. Tell PIO to honour that.
src_dir = main

[env:stick]
platform      = espressif32
framework     = espidf
board         = esp32-s3-devkitc-1
monitor_speed = 115200
upload_speed  = 921600
upload_port   = /dev/cu.usbmodem*
monitor_port  = /dev/cu.usbmodem*

; StickS3 = 8 MB flash + 8 MB OPI PSRAM
board_upload.flash_size         = 8MB
board_build.arduino.memory_type = qio_opi
board_build.f_flash             = 80000000L
board_build.flash_mode          = qio

; Suppress Arduino — we are pure ESP-IDF here. UAC + composite descriptors
; are configured through the IDF Component Manager (see main/idf_component.yml)
; and sdkconfig defaults below.
build_flags =
    -DCORE_DEBUG_LEVEL=0
